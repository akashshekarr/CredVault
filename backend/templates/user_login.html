<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>5C Network — App Portal Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#07090f;--surface:#10141f;--surface2:#161b29;--border:#232b40;--border-soft:#1a2030;--text:#e7ecf5;--muted:#6a7390;--cyan:#58E6D9;--violet:#9B7BFF;--red:#FF5C7A}
    body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
    .aurora{position:fixed;inset:0;z-index:0;pointer-events:none}
    .aurora::before{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,var(--cyan),transparent 70%);top:-200px;left:-150px;filter:blur(80px);opacity:0.35;animation:drift1 20s ease-in-out infinite alternate}
    .aurora::after{content:'';position:absolute;width:700px;height:700px;background:radial-gradient(circle,var(--violet),transparent 70%);bottom:-250px;right:-200px;filter:blur(80px);opacity:0.35;animation:drift2 24s ease-in-out infinite alternate}
    @keyframes drift1{0%{transform:translate(0,0)}100%{transform:translate(80px,60px)}}
    @keyframes drift2{0%{transform:translate(0,0)}100%{transform:translate(-60px,-40px)}}
    .card{position:relative;z-index:1;background:linear-gradient(180deg,rgba(16,20,31,0.97),rgba(11,14,23,0.97));border:1px solid var(--border-soft);border-radius:20px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 40px 80px -20px rgba(0,0,0,0.8),0 0 60px -20px rgba(155,123,255,0.25)}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:20px 20px 0 0;background:linear-gradient(90deg,var(--cyan),var(--violet))}
    .logo{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:36px}
    .logo-icon{width:52px;height:52px;background:linear-gradient(135deg,var(--cyan),var(--violet));border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px -6px rgba(88,230,217,0.5)}
    .logo-icon svg{width:24px;height:24px;fill:#07090f}
    .logo-name{font-family:'Fraunces',serif;font-size:28px;font-weight:400;background:linear-gradient(180deg,#fff,#b8c2d8);-webkit-background-clip:text;background-clip:text;color:transparent}
    .logo-sub{font-size:11px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase}
    .tagline{text-align:center;font-size:14px;color:var(--muted);margin-bottom:32px;line-height:1.6}
    .tagline strong{color:var(--text)}
    .btn-google{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:14px;background:#fff;color:#1a1a2e;border:none;border-radius:12px;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s;text-decoration:none}
    .btn-google:hover{background:#f5f5f5;transform:translateY(-1px);box-shadow:0 10px 28px -8px rgba(0,0,0,0.4)}
    .divider{text-align:center;margin:20px 0;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:10px}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
    .note{font-size:11px;color:var(--muted);text-align:center;margin-top:20px;line-height:1.6}
    .note span{color:var(--cyan)}
    .error{background:rgba(255,92,122,0.1);border:1px solid rgba(255,92,122,0.3);border-radius:8px;padding:10px 14px;font-size:12px;color:#FFB1C0;margin-bottom:16px;text-align:center;display:none}
  </style>
</head>
<body>
  <div class="aurora"></div>
  <div class="card">
    <div class="logo">
      <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 1l9 4v6c0 5.55-3.84 10.74-9 12-5.16-1.26-9-6.45-9-12V5l9-4zm0 6a3 3 0 00-3 3 3 3 0 002 2.83V17h2v-4.17A3 3 0 0014 10a3 3 0 00-2-3z"/></svg></div>
      <div class="logo-name">AppVault</div>
      <div class="logo-sub">5C Network · App Portal</div>
    </div>
    <div class="tagline">Access all your <strong>5C Network apps</strong> in one place. Request access, view credentials securely.</div>
    <div class="error" id="errMsg"></div>
    <a href="/user/login/google" class="btn-google">
      <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Sign in with Google
    </a>
    <div class="note">Only <span>@5cnetwork.com</span> and <span>@5cnetwork.in</span> accounts are allowed.</div>
  </div>
<script>
  const p = new URLSearchParams(window.location.search);
  if (p.get('error') === 'unauthorized') {
    const e = document.getElementById('errMsg');
    e.textContent = 'Access denied. Only @5cnetwork.com and @5cnetwork.in accounts are allowed.';
    e.style.display = 'block';
  } else if (p.get('error')) {
    const e = document.getElementById('errMsg');
    e.textContent = 'Authentication failed. Please try again.';
    e.style.display = 'block';
  }
</script>
</body>
</html>

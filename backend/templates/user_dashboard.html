<script>
let allApps = [], myGrants = [], myPending = [], currentUser = null;

// ---------- API ----------
async function apiFetch(path) {
  const r = await fetch(path);
  if (r.status === 401) {
    window.location.href = '/user/login';
    throw new Error('401');
  }
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

async function apiPost(path, body) {
  const r = await fetch(path, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  });
  return r.json();
}

// ---------- LOAD ----------
async function loadDashboard() {
  try {
    const [user, apps, grants, pending] = await Promise.all([
      apiFetch('/user/me'),
      apiFetch('/user/apps'),
      apiFetch('/user/my-grants'),
      apiFetch('/user/my-pending')
    ]);

    currentUser = user;
    allApps = apps;
    myGrants = grants;
    myPending = pending;

    renderAll();
    renderMine();

  } catch(e) {
    console.error("Load error:", e);
  }
}

// ---------- RENDER ALL ----------
function renderAll() {
  const el = document.getElementById('gridAll');
  const grantedSet = new Set(myGrants.map(g => g.app_name));
  const pendingSet = new Set(myPending.map(p => p.app_name));

  el.innerHTML = allApps.map(app => {

    const hasAccess = grantedSet.has(app.name);
    const isPending = pendingSet.has(app.name);

    let btn = hasAccess
      ? `<button class="app-block-btn btn-acc" data-app="${app.name}">🔓 View Credentials</button>`
      : isPending
      ? `<button class="app-block-btn btn-pend">Pending...</button>`
      : `<button class="app-block-btn btn-req" data-app="${app.name}">+ Request Access</button>`;

    return `
      <div class="app-block">
        <div class="app-block-name">${app.name}</div>
        ${btn}
      </div>
    `;
  }).join('');
}

// ---------- RENDER MINE ----------
function renderMine() {
  const el = document.getElementById('gridMine');

  el.innerHTML = myGrants.map(grant => {
    return `
      <div class="app-block">
        <div class="app-block-name">${grant.app_name}</div>
        <button class="app-block-btn btn-acc" data-app="${grant.app_name}">
          🔓 View Credentials
        </button>
      </div>
    `;
  }).join('');
}

// ---------- BUTTON CLICK HANDLER (FIXED) ----------
document.addEventListener('click', function(e) {

  const btn = e.target.closest('.app-block-btn');
  if (!btn) return;

  const appName = btn.dataset.app;
  if (!appName) return;

  // View credentials
  if (btn.classList.contains('btn-acc')) {
    openCredModal(appName);
  }

  // Request access
  if (btn.classList.contains('btn-req')) {
    openReqModal(appName);
  }

});

// ---------- MODAL ----------
function openModal() {
  document.getElementById('modalOverlay').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modalOverlay').style.display = 'none';
}

// ---------- REQUEST ----------
function openReqModal(appName) {

  document.getElementById('mTitle').textContent = appName;

  document.getElementById('mBody').innerHTML = `
    <textarea id="reqReason" placeholder="Reason..."></textarea>
  `;

  document.getElementById('mFoot').innerHTML = `
    <button onclick="closeModal()">Cancel</button>
    <button onclick="submitReq('${appName}')">Send</button>
  `;

  openModal();
}

async function submitReq(appName) {
  const reason = document.getElementById('reqReason').value;

  const r = await apiPost('/user/request-access', {
    app_name: appName,
    reason
  });

  alert(r.success ? "Request sent" : "Error");
  closeModal();
}

// ---------- CREDENTIALS ----------
function openCredModal(appName) {

  const app = allApps.find(a => a.name === appName);

  if (!app) {
    alert("App not found");
    return;
  }

  document.getElementById('mTitle').textContent = appName;

  document.getElementById('mBody').innerHTML = `
    <input type="password" id="pskInp" placeholder="Enter key"/>
  `;

  document.getElementById('mFoot').innerHTML = `
    <button onclick="closeModal()">Cancel</button>
    <button onclick="submitPsk('${appName}')">Unlock</button>
  `;

  openModal();
}

async function submitPsk(appName) {

  const psk = document.getElementById('pskInp').value;

  const r = await apiPost('/user/verify-psk', {
    app_name: appName,
    psk
  });

  if (r.success) {
    alert("Access granted");
  } else {
    alert("Invalid key");
  }
}

// ---------- INIT ----------
loadDashboard();
</script>

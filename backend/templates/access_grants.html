<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CredVault — Access Management</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#07090f;--bg-soft:#0b0e17;--surface:#10141f;--surface2:#161b29;--surface3:#1f2638;--border:#232b40;--border-soft:#1a2030;--text:#e7ecf5;--text-dim:#aab3c8;--muted:#6a7390;--cyan:#58E6D9;--violet:#9B7BFF;--pink:#FF7AC6;--acc-glow:rgba(88,230,217,0.14);--acc-ring:rgba(88,230,217,0.40);--green:#4FE39B;--green-dim:rgba(79,227,155,0.14);--amber:#FFB547;--amber-dim:rgba(255,181,71,0.14);--red:#FF5C7A;--red-dim:rgba(255,92,122,0.14);--radius:14px}
    html,body{height:100%}
    body{font-family:'Space Grotesk',sans-serif;color:var(--text);background:var(--bg);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
    .aurora{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
    .aurora::before{content:'';position:absolute;width:700px;height:700px;background:radial-gradient(circle,var(--cyan),transparent 70%);top:-200px;left:-150px;filter:blur(80px);opacity:0.4;animation:drift1 22s ease-in-out infinite alternate}
    .aurora::after{content:'';position:absolute;width:800px;height:800px;background:radial-gradient(circle,var(--violet),transparent 70%);bottom:-250px;right:-200px;filter:blur(80px);opacity:0.4;animation:drift2 26s ease-in-out infinite alternate}
    @keyframes drift1{0%{transform:translate(0,0) scale(1)}100%{transform:translate(120px,80px) scale(1.15)}}
    @keyframes drift2{0%{transform:translate(0,0) scale(1)}100%{transform:translate(-100px,-60px) scale(1.1)}}
    .grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(88,230,217,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(88,230,217,0.04) 1px,transparent 1px);background-size:48px 48px}
    body>*:not(.aurora):not(.grid-bg){position:relative;z-index:1}
    .header{background:rgba(11,14,23,0.6);backdrop-filter:saturate(160%) blur(18px);border-bottom:1px solid var(--border-soft);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
    .header::after{content:'';position:absolute;left:0;right:0;bottom:-1px;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),var(--violet),transparent);opacity:0.5}
    .logo{display:flex;align-items:center;gap:14px}
    .logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--cyan),var(--violet));border-radius:11px;display:flex;align-items:center;justify-content:center}
    .logo-icon svg{width:18px;height:18px;fill:#07090f}
    .logo-name{font-family:'Fraunces',serif;font-size:22px;font-weight:400;background:linear-gradient(180deg,#fff,#b8c2d8);-webkit-background-clip:text;background-clip:text;color:transparent}
    .logo-tag{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--muted);margin-top:4px;letter-spacing:0.08em;text-transform:uppercase}
    .nav{display:flex;gap:8px}
    .nav a{font-size:12px;font-weight:600;padding:8px 14px;border-radius:8px;text-decoration:none;color:var(--text-dim);transition:all 0.18s;border:1px solid transparent}
    .nav a:hover{color:var(--cyan);border-color:var(--border)}
    .nav a.active{background:var(--surface2);color:var(--cyan);border-color:var(--border)}
    .header-right{display:flex;gap:10px;align-items:center}
    .btn{background:linear-gradient(180deg,var(--surface2),var(--surface));border:1px solid var(--border);color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;padding:9px 16px;border-radius:10px;cursor:pointer;transition:all 0.2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
    .btn:hover{border-color:var(--cyan);color:var(--cyan);transform:translateY(-1px)}
    .btn-primary{background:linear-gradient(135deg,var(--cyan),var(--violet));color:#07090f;border:none;font-weight:700}
    .btn-primary:hover{color:#07090f;filter:brightness(1.1)}
    .btn-danger{color:var(--red);border-color:rgba(255,92,122,0.3);background:var(--red-dim)}
    .btn-danger:hover{background:rgba(255,92,122,0.2);color:var(--red)}
    .btn-sm{padding:5px 10px;font-size:11px}
    .main{padding:28px;max-width:1380px;margin:0 auto}
    .page-tabs{display:flex;gap:4px;background:rgba(255,255,255,0.04);border-radius:12px;padding:4px;margin-bottom:28px;width:fit-content}
    .page-tab{padding:10px 24px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;border:none;background:none;color:var(--muted)}
    .page-tab.active{background:linear-gradient(135deg,var(--cyan),var(--violet));color:#07090f}
    .panel{display:none}
    .panel.active{display:block}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
    .card{background:linear-gradient(180deg,rgba(16,20,31,0.9),rgba(11,14,23,0.9));border:1px solid var(--border-soft);border-radius:var(--radius);overflow:hidden}
    .card-head{padding:16px 20px;border-bottom:1px solid var(--border-soft);display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,rgba(255,255,255,0.025),transparent)}
    .card-title{font-size:11px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-dim);display:flex;align-items:center;gap:10px}
    .card-title::before{content:'';width:6px;height:6px;border-radius:2px;background:linear-gradient(135deg,var(--cyan),var(--violet));box-shadow:0 0 10px var(--cyan)}
    .card-body{padding:20px}
    .field{margin-bottom:16px}
    .field label{display:block;font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:7px}
    .field input,.field select,.field textarea{width:100%;background:var(--bg-soft);border:1px solid var(--border);border-radius:9px;padding:10px 13px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;outline:none;transition:all 0.18s}
    .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 3px var(--acc-glow)}
    .field input::placeholder,.field textarea::placeholder{color:var(--muted)}
    .field select option{background:var(--surface)}
    .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .field-info{background:var(--surface2);border:1px solid var(--border-soft);border-radius:8px;padding:10px 13px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--text-dim);min-height:38px}
    .badge{font-size:10px;padding:3px 10px;border-radius:999px;font-family:'JetBrains Mono',monospace;font-weight:500}
    .badge-cred{background:rgba(88,230,217,0.12);color:var(--cyan);border:1px solid rgba(88,230,217,0.3)}
    .badge-id{background:rgba(155,123,255,0.12);color:var(--violet);border:1px solid rgba(155,123,255,0.3)}
    .success{background:rgba(79,227,155,0.1);border:1px solid rgba(79,227,155,0.3);border-radius:8px;padding:10px 14px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--green);margin-top:12px;display:none}
    .error-msg{background:var(--red-dim);border:1px solid rgba(255,92,122,0.3);border-radius:8px;padding:10px 14px;font-size:12px;font-family:'JetBrains Mono',monospace;color:#FFB1C0;margin-top:12px;display:none}
    table{width:100%;border-collapse:collapse}
    thead th{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;padding:10px 16px;text-align:left;border-bottom:1px solid var(--border-soft);background:rgba(255,255,255,0.02)}
    tbody td{padding:10px 16px;font-size:12px;font-family:'JetBrains Mono',monospace;border-bottom:1px solid var(--border-soft);color:var(--text-dim)}
    tbody tr:last-child td{border-bottom:none}
    tbody tr:hover td{background:var(--surface2);color:var(--text)}
    .empty{text-align:center;padding:40px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted)}
    .loading{text-align:center;padding:40px;font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--cyan);letter-spacing:0.16em;text-transform:uppercase}
    .search-bar{display:flex;gap:10px;margin-bottom:20px}
    .search-bar input{flex:1;background:var(--bg-soft);border:1px solid var(--border);border-radius:9px;padding:10px 14px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;outline:none}
    .search-bar input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px var(--acc-glow)}
    .report-user-card{background:linear-gradient(135deg,rgba(88,230,217,0.06),rgba(155,123,255,0.06));border:1px solid var(--border-soft);border-radius:12px;padding:20px;margin-bottom:20px}
    .report-user-name{font-size:20px;font-weight:700;margin-bottom:4px}
    .report-user-meta{font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--text-dim)}
    .stat-pills{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
    .stat-pill{font-size:11px;font-family:'JetBrains Mono',monospace;padding:4px 12px;border-radius:999px;background:var(--surface2);border:1px solid var(--border);color:var(--text-dim)}
    .stat-pill span{color:var(--cyan);font-weight:700}
    .autocomplete-list{position:absolute;background:var(--surface);border:1px solid var(--border);border-radius:9px;z-index:100;max-height:200px;overflow-y:auto;width:100%}
    .autocomplete-item{padding:10px 13px;cursor:pointer;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--text-dim);border-bottom:1px solid var(--border-soft)}
    .autocomplete-item:last-child{border-bottom:none}
    .autocomplete-item:hover{background:var(--surface2);color:var(--cyan)}
    .autocomplete-wrap{position:relative}
    @media(max-width:900px){.grid-2{grid-template-columns:1fr}.field-row{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="aurora"></div>
  <div class="grid-bg"></div>

  <header class="header">
    <div class="logo">
      <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 1l9 4v6c0 5.55-3.84 10.74-9 12-5.16-1.26-9-6.45-9-12V5l9-4zm0 6a3 3 0 00-3 3 3 3 0 002 2.83V17h2v-4.17A3 3 0 0014 10a3 3 0 00-2-3z"/></svg></div>
      <div>
        <div class="logo-name">CredVault</div>
        <div class="logo-tag">5C Network · Access Management</div>
      </div>
    </div>
    <div class="nav">
      <a href="/admin">Dashboard</a>
      <a href="/admin/access" class="active">Access Management</a>
    </div>
    <div class="header-right">
      <a href="/admin/logout" class="btn" style="color:var(--red);border-color:rgba(255,92,122,0.3)">⎋ Logout</a>
    </div>
  </header>

  <main class="main">
    <div class="page-tabs">
      <button class="page-tab active" onclick="switchTab('grant')">📋 Grant Access</button>
      <button class="page-tab" onclick="switchTab('records')">📊 All Records</button>
      <button class="page-tab" onclick="switchTab('reports')">🔍 Reports</button>
    </div>

    <!-- GRANT ACCESS PANEL -->
    <div class="panel active" id="panel-grant">
      <div class="grid-2">
        <div class="card">
          <div class="card-head"><div class="card-title">Grant Application Access</div></div>
          <div class="card-body">
            <div class="field">
              <label>Employee Name *</label>
              <div class="autocomplete-wrap">
                <input type="text" id="grantUserName" placeholder="Start typing name..." oninput="searchUsers(this.value)" autocomplete="off"/>
                <div class="autocomplete-list" id="autocompleteList" style="display:none"></div>
              </div>
            </div>
            <div class="field-row">
              <div class="field">
                <label>Designation</label>
                <div class="field-info" id="grantDesig">—</div>
              </div>
              <div class="field">
                <label>Department</label>
                <div class="field-info" id="grantDept">—</div>
              </div>
            </div>
            <div class="field">
              <label>Application *</label>
              <select id="grantApp">
                <option value="">Select application...</option>
              </select>
            </div>
            <div class="field">
              <label>Access Type *</label>
              <select id="grantType">
                <option value="">Select access type...</option>
                <option value="Credentials">Credentials — shared company account</option>
                <option value="Individual ID">Individual ID — their own account/email</option>
              </select>
            </div>
            <div class="field">
              <label>Notes (optional)</label>
              <textarea id="grantNotes" rows="2" placeholder="e.g. License seat #3, expires Dec 2025..."></textarea>
            </div>
            <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px" onclick="saveGrant()">✓ Save Access Record</button>
            <div class="success" id="grantSuccess">Access record saved successfully!</div>
            <div class="error-msg" id="grantError"></div>
          </div>
        </div>

        <div class="card">
          <div class="card-head"><div class="card-title">Recent Grants</div></div>
          <div id="recentGrantsPanel"><div class="loading">loading...</div></div>
        </div>
      </div>
    </div>

    <!-- ALL RECORDS PANEL -->
    <div class="panel" id="panel-records">
      <div class="card">
        <div class="card-head">
          <div class="card-title">All Access Records</div>
          <span id="recordCount" style="font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--muted)"></span>
        </div>
        <div class="search-bar" style="padding:14px 20px 0">
          <input type="text" id="recordSearch" placeholder="search by name, app, type..." oninput="filterRecords()"/>
          <select id="recordTypeFilter" style="background:var(--bg-soft);border:1px solid var(--border);border-radius:9px;padding:10px 13px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;outline:none" onchange="filterRecords()">
            <option value="">all types</option>
            <option value="Credentials">Credentials</option>
            <option value="Individual ID">Individual ID</option>
          </select>
        </div>
        <div id="allRecordsPanel"><div class="loading">loading...</div></div>
      </div>
    </div>

    <!-- REPORTS PANEL -->
    <div class="panel" id="panel-reports">
      <div class="card" style="margin-bottom:20px">
        <div class="card-head"><div class="card-title">Search Reports</div></div>
        <div class="card-body">
          <div class="field-row">
            <div class="field">
              <label>Search by Employee Name</label>
              <div style="display:flex;gap:10px">
                <input type="text" id="reportUserSearch" placeholder="e.g. Mohammed Ashik" style="flex:1"/>
                <button class="btn btn-primary" onclick="runUserReport()">Search</button>
              </div>
            </div>
            <div class="field">
              <label>Search by Application</label>
              <div style="display:flex;gap:10px">
                <input type="text" id="reportAppSearch" placeholder="e.g. ChatGPT" style="flex:1"/>
                <button class="btn btn-primary" onclick="runAppReport()">Search</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div id="reportResults"></div>
    </div>
  </main>

<script>
  let allUsers = [];
  let allApps = [];
  let allGrants = [];
  let selectedUser = null;

  async function get(path){ const r = await fetch(path); if(!r.ok) throw new Error(r.status); return r.json(); }
  async function post(path,body){ const r = await fetch(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}); return r.json(); }
  async function del(path){ const r = await fetch(path,{method:'DELETE'}); return r.json(); }

  const fmtDate = d => { if(!d) return '—'; const dt=new Date(d); return isNaN(dt)?'—':dt.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}); };
  const colorFor = s => { const c=['#58E6D9','#9B7BFF','#4FE39B','#FF7AC6','#FFB547']; let h=0; for(const x of s) h=(h*31+x.charCodeAt(0))>>>0; return c[h%c.length]; };
  const initials = s => s.trim().split(/\s+/).map(w=>w[0]||'').slice(0,2).join('').toUpperCase()||'?';

  function switchTab(tab) {
    document.querySelectorAll('.page-tab').forEach((t,i)=>t.classList.toggle('active',['grant','records','reports'][i]===tab));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    document.getElementById('panel-'+tab).classList.add('active');
    if(tab==='records') renderAllRecords();
  }

  async function loadData() {
    try {
      const [users, apps, grants] = await Promise.all([
        get('/admin/users'), get('/admin/applications'), get('/admin/access-grants')
      ]);
      allUsers = users;
      allApps = apps;
      allGrants = grants;

      // Populate app dropdown
      const appSelect = document.getElementById('grantApp');
      appSelect.innerHTML = '<option value="">Select application...</option>' +
        apps.map(a => `<option value="${a.name}">${a.name}</option>`).join('');

      renderRecentGrants();
    } catch(e) { console.error(e); }
  }

  function searchUsers(q) {
    const list = document.getElementById('autocompleteList');
    if (!q || q.length < 2) { list.style.display='none'; return; }
    const matches = allUsers.filter(u => u.name.toLowerCase().includes(q.toLowerCase())).slice(0, 8);
    if (!matches.length) { list.style.display='none'; return; }
    list.innerHTML = matches.map(u => `
      <div class="autocomplete-item" onclick="selectUser(${JSON.stringify(u).replace(/"/g,'&quot;')})">
        <strong>${u.name}</strong> <span style="color:var(--muted)">· ${u.designation||''} · ${u.department||''}</span>
      </div>`).join('');
    list.style.display = 'block';
  }

  function selectUser(user) {
    selectedUser = user;
    document.getElementById('grantUserName').value = user.name;
    document.getElementById('grantDesig').textContent = user.designation || '—';
    document.getElementById('grantDept').textContent = user.department || '—';
    document.getElementById('autocompleteList').style.display = 'none';
  }

  document.addEventListener('click', e => {
    if (!e.target.closest('.autocomplete-wrap')) {
      document.getElementById('autocompleteList').style.display = 'none';
    }
  });

  async function saveGrant() {
    const userName = document.getElementById('grantUserName').value.trim();
    const appName = document.getElementById('grantApp').value;
    const accessType = document.getElementById('grantType').value;
    const notes = document.getElementById('grantNotes').value.trim();
    const successEl = document.getElementById('grantSuccess');
    const errorEl = document.getElementById('grantError');
    successEl.style.display='none'; errorEl.style.display='none';

    if (!userName || !appName || !accessType) {
      errorEl.textContent = 'Please fill in all required fields.';
      errorEl.style.display = 'block'; return;
    }

    const payload = {
      user_name: userName,
      app_name: appName,
      access_type: accessType,
      notes: notes,
      user_designation: selectedUser?.designation || '',
      user_department: selectedUser?.department || '',
      user_email: selectedUser ? (userName.toLowerCase().replace(/\s+/g,'.') + '@5cnetwork.com') : ''
    };

    const r = await post('/admin/access-grants', payload);
    if (r.success) {
      successEl.style.display = 'block';
      document.getElementById('grantUserName').value = '';
      document.getElementById('grantDesig').textContent = '—';
      document.getElementById('grantDept').textContent = '—';
      document.getElementById('grantApp').value = '';
      document.getElementById('grantType').value = '';
      document.getElementById('grantNotes').value = '';
      selectedUser = null;
      await loadData();
    } else {
      errorEl.textContent = r.error || 'Failed to save.';
      errorEl.style.display = 'block';
    }
  }

  function renderRecentGrants() {
    const el = document.getElementById('recentGrantsPanel');
    const recent = allGrants.slice(0, 10);
    if (!recent.length) { el.innerHTML = '<div class="empty">no records yet</div>'; return; }
    el.innerHTML = `<table>
      <thead><tr><th>Employee</th><th>Application</th><th>Type</th><th>Date</th><th></th></tr></thead>
      <tbody>${recent.map(g=>`
        <tr>
          <td><strong style="color:var(--text)">${g.user_name}</strong><br><span style="color:var(--muted);font-size:10px">${g.user_department||''}</span></td>
          <td>${g.app_name}</td>
          <td><span class="badge ${g.access_type==='Credentials'?'badge-cred':'badge-id'}">${g.access_type}</span></td>
          <td>${fmtDate(g.granted_at)}</td>
          <td><button class="btn btn-danger btn-sm" onclick="deleteGrant(${g.id})">✕</button></td>
        </tr>`).join('')}
      </tbody></table>`;
  }

  let filteredRecords = [];
  function renderAllRecords() {
    filteredRecords = allGrants;
    document.getElementById('recordCount').textContent = `${allGrants.length} records`;
    displayRecords(filteredRecords);
  }

  function filterRecords() {
    const q = document.getElementById('recordSearch').value.toLowerCase();
    const t = document.getElementById('recordTypeFilter').value;
    let rows = allGrants.slice();
    if (t) rows = rows.filter(g => g.access_type === t);
    if (q) rows = rows.filter(g => JSON.stringify(g).toLowerCase().includes(q));
    displayRecords(rows);
  }

  function displayRecords(records) {
    const el = document.getElementById('allRecordsPanel');
    if (!records.length) { el.innerHTML = '<div class="empty">no records found</div>'; return; }
    el.innerHTML = `<table>
      <thead><tr><th>Employee</th><th>Designation</th><th>Department</th><th>Application</th><th>Access Type</th><th>Granted By</th><th>Date</th><th>Notes</th><th></th></tr></thead>
      <tbody>${records.map(g=>`
        <tr>
          <td style="color:var(--text);font-weight:600">${g.user_name}</td>
          <td>${g.user_designation||'—'}</td>
          <td>${g.user_department||'—'}</td>
          <td><span style="color:var(--cyan)">${g.app_name}</span></td>
          <td><span class="badge ${g.access_type==='Credentials'?'badge-cred':'badge-id'}">${g.access_type}</span></td>
          <td>${g.granted_by||'—'}</td>
          <td>${fmtDate(g.granted_at)}</td>
          <td style="color:var(--muted);max-width:150px;overflow:hidden;text-overflow:ellipsis">${g.notes||'—'}</td>
          <td><button class="btn btn-danger btn-sm" onclick="deleteGrant(${g.id})">✕</button></td>
        </tr>`).join('')}
      </tbody></table>`;
  }

  async function deleteGrant(id) {
    if (!confirm('Remove this access record?')) return;
    await del('/admin/access-grants/' + id);
    await loadData();
    filterRecords();
  }

  async function runUserReport() {
    const q = document.getElementById('reportUserSearch').value.trim();
    if (!q) return;
    const el = document.getElementById('reportResults');
    el.innerHTML = '<div class="loading">searching...</div>';
    try {
      const data = await get('/admin/reports/user/' + encodeURIComponent(q));
      if (!data.length) { el.innerHTML = '<div class="card"><div class="empty">no records found for "' + q + '"</div></div>'; return; }
      const user = data[0];
      const credCount = data.filter(d=>d.access_type==='Credentials').length;
      const idCount = data.filter(d=>d.access_type==='Individual ID').length;
      el.innerHTML = `
        <div class="report-user-card">
          <div class="report-user-name">${q}</div>
          <div class="report-user-meta">${user.user_designation||''} ${user.user_department?'· '+user.user_department:''}</div>
          <div class="stat-pills">
            <div class="stat-pill">Total Apps: <span>${data.length}</span></div>
            <div class="stat-pill">Credentials: <span>${credCount}</span></div>
            <div class="stat-pill">Individual ID: <span>${idCount}</span></div>
          </div>
        </div>
        <div class="card">
          <table>
            <thead><tr><th>Application</th><th>Access Type</th><th>Granted By</th><th>Date</th><th>Notes</th></tr></thead>
            <tbody>${data.map(d=>`
              <tr>
                <td><span style="color:var(--cyan);font-weight:600">${d.app_name}</span></td>
                <td><span class="badge ${d.access_type==='Credentials'?'badge-cred':'badge-id'}">${d.access_type}</span></td>
                <td>${d.granted_by||'—'}</td>
                <td>${fmtDate(d.granted_at)}</td>
                <td style="color:var(--muted)">${d.notes||'—'}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>`;
    } catch(e) { el.innerHTML = '<div class="card"><div class="empty">error loading report</div></div>'; }
  }

  async function runAppReport() {
    const q = document.getElementById('reportAppSearch').value.trim();
    if (!q) return;
    const el = document.getElementById('reportResults');
    el.innerHTML = '<div class="loading">searching...</div>';
    try {
      const data = await get('/admin/reports/app/' + encodeURIComponent(q));
      if (!data.length) { el.innerHTML = '<div class="card"><div class="empty">no records found for "' + q + '"</div></div>'; return; }
      const credCount = data.filter(d=>d.access_type==='Credentials').length;
      const idCount = data.filter(d=>d.access_type==='Individual ID').length;
      el.innerHTML = `
        <div class="report-user-card">
          <div class="report-user-name">${q}</div>
          <div class="report-user-meta">Application Access Report</div>
          <div class="stat-pills">
            <div class="stat-pill">Total Users: <span>${data.length}</span></div>
            <div class="stat-pill">Credentials: <span>${credCount}</span></div>
            <div class="stat-pill">Individual ID: <span>${idCount}</span></div>
          </div>
        </div>
        <div class="card">
          <table>
            <thead><tr><th>Employee</th><th>Designation</th><th>Department</th><th>Access Type</th><th>Date</th></tr></thead>
            <tbody>${data.map(d=>`
              <tr>
                <td style="color:var(--text);font-weight:600">${d.user_name}</td>
                <td>${d.user_designation||'—'}</td>
                <td>${d.user_department||'—'}</td>
                <td><span class="badge ${d.access_type==='Credentials'?'badge-cred':'badge-id'}">${d.access_type}</span></td>
                <td>${fmtDate(d.granted_at)}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>`;
    } catch(e) { el.innerHTML = '<div class="card"><div class="empty">error loading report</div></div>'; }
  }

  // Enter key for reports
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('reportUserSearch').addEventListener('keydown', e => { if(e.key==='Enter') runUserReport(); });
    document.getElementById('reportAppSearch').addEventListener('keydown', e => { if(e.key==='Enter') runAppReport(); });
  });

  loadData();
</script>
</body>
</html>
